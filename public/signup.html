<!DOCTYPE html>

<html>

<head>

<title>Signup - Craft-Kart</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:Arial;
background:#e8d8c3;
text-align:center;
margin-top:120px;
}

.signupBox{
background:white;
display:inline-block;
padding:40px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.2);
}

input,select{
display:block;
margin:10px auto;
padding:10px;
width:240px;
box-sizing:border-box;
}

.passwordBox{
position:relative;
width:240px;
margin:10px auto;
}

.passwordBox input{
width:100%;
padding:10px;
padding-right:40px;
box-sizing:border-box;
}

.eyeIcon{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:#7b4b2a;
transition:all 0.25s ease;
}

.eyeIcon:hover{
color:#5e3a20;
transform:translateY(-50%) scale(1.15);
}

.eyeIcon.animate{
transform:translateY(-50%) rotate(180deg);
}

button{
padding:10px 20px;
background:#7b4b2a;
color:white;
border:none;
cursor:pointer;
width:160px;
margin-top:10px;
}

button:hover{
background:#5e3a20;
}

</style>

</head>

<body>

<div class="signupBox">

<h2>Create Account</h2>

<form id="signupForm">

<input
type="text"
id="name"
placeholder="Name"
required

>

<input
type="email"
id="email"
placeholder="Email"
required

>

<div class="passwordBox">

<input
type="password"
id="password"
placeholder="Password"
required

>

<i class="fa-solid fa-eye-slash eyeIcon"
onclick="togglePassword()"
id="toggleEye"></i>

</div>

<select id="role">

<option value="customer">Customer</option>

<option value="artisan">Artisan</option>

</select>

<button type="submit">Sign Up</button>

</form>

</div>

<script>

function togglePassword(){

const password=document.getElementById("password");
const eye=document.getElementById("toggleEye");

eye.classList.add("animate");

setTimeout(()=>{
eye.classList.remove("animate");
},200);

if(password.type==="password"){

password.type="text";
eye.classList.remove("fa-eye-slash");
eye.classList.add("fa-eye");

}else{

password.type="password";
eye.classList.remove("fa-eye");
eye.classList.add("fa-eye-slash");

}

}


document
.getElementById("signupForm")
.addEventListener("submit", async function(e){

e.preventDefault();

const res=await fetch("/api/auth/signup",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:name.value,
email:email.value,
password:password.value,
role:role.value

})

});

const msg=await res.text();

alert(msg);

window.location="login.html";

});

</script>



</body>
</html>
